    <style>
        body {
            margin-top: 15px;
            background-color: lightgray;
        }

        h2 {
            width: 14ch;
            font-family: monospace;
            font-size: 3rem;
            color: grey;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #e8ff47;
            animation: typing 3s steps(14) 0.5S infinite alternate-reverse;
        }

        @keyframes typing {
            from {
                width: 0ch;
            }
        }

        .Head {
            font-family: Corbel;
            color: blue;
        }

        input {
            height: 50px;
            width: 250px;
            border: double;
            border-radius: 15px;
            border-color: red;
        }

        button {
            height: 50px;
            background: linear-gradient(lightgray,blue);
            width: 100px;
            border-radius: 5px;
            font-size: 15px;
            font-family: 'Lucida Calligraphy';
            color: yellow;
            font: bolder;
        }

        .motion {
            display: flex;
            height: 300px;
        }

        .btn {
            margin-left: 400px;
            margin-right: 0;
            width: 50%;
        }

        button:hover {
            transform: translateY(-10px);
            transition: 0.3s ease;
        }

        select {
            background: linear-gradient(black,blue);
            border-radius: 10px;
        }

        img {
            width: 500px;
            border-radius: 10px;
            border-color: blue;
        }

        .anime {
            display: flex;
        }

            .anime:hover {
                transform: translateY(-10px);
                transition: 0.3s ease;
            }

        .nature {
            display: flex;
        }

            .nature:hover {
                transform: translateY(-10px);
                transition: 0.3s ease;
            }

        .car {
            display: flex;
        }

            .car:hover {
                transform: translateY(-10px);
                transition: 0.3s ease;
            }

        .window {
            display: flex;
        }

            .window:hover {
                transform: translateY(-10px);
                transition: 0.3s ease;
            }

        .comp {
            display: flex;
        }

            .comp:hover {
                transform: translateY(-10px);
                transition: 0.3s ease;
            }

        .icon-container {
            display: flex;
            gap: 25px;
            padding: 20px;
        }

        .icon-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease-in-out;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

            .icon-link svg {
                width: 40px;
                height: 40px;
                fill: white;
                transition: transform 0.3s ease;
            }

            .icon-link:hover {
                transform: translateY(-8px) scale(1.05);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            }

                .icon-link:hover svg {
                    transform: rotate(-10deg);
                }

            .icon-link.youtube {
                background-color: #FF0000;
            }

                .icon-link.youtube svg {
                    fill: none;
                    stroke: white;
                    stroke-width: 2;
                }

                    .icon-link.youtube svg path.play-triangle {
                        fill: white;
                        stroke: none;
                    }

            .icon-link.instagram {
                background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            }

            .icon-link.facebook {
                background-color: #1877F2;
            }

            .icon-link.linkedin {
                background-color: #0077B5;
            }

            .icon-link.x {
                background-color: #000000;
            }

        footer {
            height: auto;
            width: auto;
            background: linear-gradient(lightgray,black);
        }

        h1 {
            font-family: 'Lucida Calligraphy';
            font-size: 30px;
        }
    </style>
